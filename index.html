<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Kervis Soo | 苏才育博士</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Space Grotesk', sans-serif;
            color: #e2e2e2;
        }

        /* Overlay content */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        #overlay > * { pointer-events: auto; }

        /* Pulse badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 9999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #00f3ff;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
            margin-bottom: 32px;
        }
        .pulse-dot {
            position: relative;
            width: 8px; height: 8px;
        }
        .pulse-dot::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #00f3ff;
            animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
            opacity: 0.75;
        }
        .pulse-dot::after {
            content: '';
            position: relative;
            display: block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #00f3ff;
        }
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }

        /* Title */
        .title {
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 700;
            letter-spacing: -2px;
            text-align: center;
            margin-bottom: 16px;
            text-shadow: 0 0 60px rgba(0,243,255,0.3);
        }
        .subtitle {
            font-family: 'Manrope', sans-serif;
            font-size: clamp(16px, 2.5vw, 24px);
            color: rgba(255,255,255,0.5);
            font-weight: 300;
            text-align: center;
            max-width: 600px;
            margin-bottom: 48px;
        }

        /* Enter button */
        .enter-btn {
            display: inline-block;
            padding: 16px 48px;
            background: linear-gradient(135deg, #00f3ff, #34ff8d);
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(0,243,255,0.3);
        }
        .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(0,243,255,0.5);
        }

        /* Scroll hint at bottom */
        .scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: bounce 2s ease-in-out infinite;
        }
        .scroll-hint span {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .scroll-hint .material-symbols-outlined {
            color: rgba(255,255,255,0.3);
            font-size: 28px;
        }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(12px); }
        }

        /* Fade-in animation */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s ease forwards;
        }
        .fade-in:nth-child(1) { animation-delay: 0.5s; }
        .fade-in:nth-child(2) { animation-delay: 0.8s; }
        .fade-in:nth-child(3) { animation-delay: 1.1s; }
        .fade-in:nth-child(4) { animation-delay: 1.4s; }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Warp flash overlay */
        #warp-flash {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #warp-flash.active {
            opacity: 1;
        }

        /* Overlay fade out during warp */
        #overlay.warping {
            transition: opacity 0.4s ease;
            opacity: 0;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

<!-- Warp Effects -->
<div id="warp-flash"></div>
<!-- Overlay Content -->
<div id="overlay">
    <div class="title fade-in">Dr. Kervis Soo</div>
    <div class="subtitle fade-in">苏才育博士 — AI 应用专家与数字经济愿景家</div>
    <a href="#" id="enter-btn" class="enter-btn fade-in">Enter</a>
</div>

<!-- Bottom hint -->
<div class="scroll-hint">
    <span>Explore the Universe</span>
    <span class="material-symbols-outlined">expand_more</span>
</div>

<!-- 3D Earth Scene -->
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const COUNT = 5000;
    const SPEED_MULT = 1;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.01);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 0, 100);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.0;
    controls.enableZoom = false;

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
    composer.addPass(bloomPass);

    const dummy = new THREE.Object3D();
    const color = new THREE.Color();
    const target = new THREE.Vector3();

    const geometry = new THREE.ConeGeometry(0.1, 0.5, 4).rotateX(Math.PI / 2);
    const material = new THREE.MeshBasicMaterial({ color: 0x00aaff });
    const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
    instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    scene.add(instancedMesh);

    const positions = [];
    for (let i = 0; i < COUNT; i++) {
        positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
        instancedMesh.setColorAt(i, color.setHex(0x00ff88));
    }

    const PARAMS = { radius: 40, oceanDepth: 2, atmosphereHeight: 6, rotSpeed: 0.15, cloudDensity: 4 };
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime() * SPEED_MULT;
        controls.update();

        const count = COUNT;
        for (let i = 0; i < COUNT; i++) {
            const radius = PARAMS.radius;
            const oceanDepth = PARAMS.oceanDepth;
            const atmosphereHeight = PARAMS.atmosphereHeight;
            const rotSpeed = PARAMS.rotSpeed;
            const cloudDensity = PARAMS.cloudDensity;

            const phi = Math.acos(1 - 2 * (i / count));
            const theta = Math.sqrt(count * Math.PI) * phi + time * rotSpeed;
            const sinPhi = Math.sin(phi), cosPhi = Math.cos(phi);
            const sinTheta = Math.sin(theta), cosTheta = Math.cos(theta);
            const lat = cosPhi;
            const lon = Math.atan2(sinTheta, cosTheta);

            const n1 = Math.sin(lat * 8.3 + lon * 6.1 + time * 0.05);
            const n2 = Math.sin(lat * 14.7 - lon * 11.3 + time * 0.03);
            const n3 = Math.cos(lat * 5.1 + lon * 9.7 + time * 0.07);
            const n4 = Math.sin(lat * 20.0 + lon * 17.0);
            const terrain = (n1 * 0.45 + n2 * 0.3 + n3 * 0.2 + n4 * 0.05);

            const isOcean = terrain < -0.05;
            const isMountain = terrain > 0.3;
            const isPolar = Math.abs(lat) > 0.82;
            const cloudNoise = Math.sin(lat * 12.0 + lon * 9.0 + time * 0.12) * Math.cos(lat * 7.0 - lon * 13.0 + time * 0.09);
            const isCloud = cloudNoise > (1.0 - cloudDensity * 0.09);
            const isAtmo = i > count * 0.92;

            const cloudR = radius + 1.2 + Math.sin(lon * 5.0 + time * 0.1) * 0.4;
            const atmoR = radius + atmosphereHeight * (0.8 + Math.sin(lon * 3.0 + lat * 4.0 + time * 0.04) * 0.2);
            const landR = radius + Math.max(0, terrain) * 3.5;
            const oceanR = radius - Math.abs(Math.min(0, terrain)) * oceanDepth;
            const r = isAtmo ? atmoR : (isCloud ? cloudR : (isOcean ? oceanR : landR));

            const px = sinPhi * cosTheta * r;
            const py = cosPhi * r;
            const pz = sinPhi * sinTheta * r;
            target.set(px, py, pz);

            const snowCap = isMountain && Math.abs(lat) > 0.3;
            const hue = isAtmo ? 0.6 : (isCloud ? 0.0 : (isOcean ? 0.58 + terrain * 0.04 : (isPolar ? 0.0 : (isMountain ? 0.08 : 0.28 + terrain * 0.12))));
            const sat = isAtmo ? 0.6 : (isCloud ? 0.0 : (isOcean ? 0.75 + terrain * 0.1 : (isPolar ? 0.05 : (isMountain ? 0.25 : 0.55))));
            const oceanLit = 0.3 + Math.abs(lat) * 0.1;
            const landLit = isPolar ? 0.92 : (snowCap ? 0.95 : (isMountain ? 0.38 : 0.42 + terrain * 0.15));
            const lit = isAtmo ? 0.55 + Math.abs(lat) * 0.1 : (isCloud ? 0.88 + Math.sin(time * 0.2) * 0.05 : (isOcean ? oceanLit : landLit));
            color.setHSL(hue, sat, lit);

            positions[i].lerp(target, 0.1);
            dummy.position.copy(positions[i]);
            dummy.updateMatrix();
            instancedMesh.setMatrixAt(i, dummy.matrix);
            instancedMesh.setColorAt(i, color);
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        instancedMesh.instanceColor.needsUpdate = true;
        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== SUBTLE ZOOM TRANSITION ====================
    const warpFlash = document.getElementById('warp-flash');
    const overlay = document.getElementById('overlay');
    const scrollHint = document.querySelector('.scroll-hint');
    let isWarping = false;

    function animateTransition(startTime) {
        if (!isWarping) return;
        const elapsed = (performance.now() - startTime) / 1000;
        const duration = 1.2;
        const progress = Math.min(elapsed / duration, 1);
        // Ease-in curve for gentle acceleration
        const ease = progress * progress;

        // Gentle camera zoom toward Earth
        camera.position.z -= 0.3 + ease * 1.5;
        camera.fov = 60 + ease * 10;
        camera.updateProjectionMatrix();

        // Slight bloom increase
        bloomPass.strength = 1.8 + ease * 1.2;

        if (progress >= 1) {
            warpFlash.classList.add('active');
            setTimeout(() => {
                window.location.href = 'landing.html';
            }, 350);
            return;
        }

        requestAnimationFrame(() => animateTransition(startTime));
    }

    document.getElementById('enter-btn').addEventListener('click', (e) => {
        e.preventDefault();
        if (isWarping) return;
        isWarping = true;

        // Fade out text
        overlay.classList.add('warping');
        scrollHint.style.transition = 'opacity 0.3s';
        scrollHint.style.opacity = '0';

        // Disable controls
        controls.autoRotate = false;
        controls.enabled = false;

        animateTransition(performance.now());
    });
</script>
</body>
</html>
